# ---------------------------------------------------------------------------
# ESPHome secrets template — shared by all AirSensor units.
# Copy this file to private/secrets.yaml and fill in the real values.
# The private/ folder is gitignored and should never be committed.
# ---------------------------------------------------------------------------

# Wi-Fi network the devices connect to.
wifi_ssid: ""
wifi_password: ""

# 32-byte base64 key for the ESPHome native API encryption.
# Generate with: openssl rand -base64 32
# Must match the key configured in Home Assistant for each device.
api_encryption_key: ""

# Password required to push OTA firmware updates.
ota_password: ""

# Password for the fallback Wi-Fi hotspot each device broadcasts
# when it cannot reach the main network.
fallback_hotspot_password: ""
